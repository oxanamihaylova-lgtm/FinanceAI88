<script>
const METRIKA_ID=107207334;
const REGISTRATION_COMPLETE_KEY="finai-registration-complete";
function metrikaGoal(goal,params={},callback){
  console.info("[Metrika goal]",goal,params);
  if(typeof ym==="function"){
    ym(METRIKA_ID,"reachGoal",goal,params,callback);
  }
}
function completeRegistrationOnce(source){
  if(localStorage.getItem(REGISTRATION_COMPLETE_KEY))return;
  metrikaGoal("registration_complete",{source},()=>{
    localStorage.setItem(REGISTRATION_COMPLETE_KEY,"1");
  });
}
metrikaGoal("registration_start",{source:"app_open"});

const KEY="ai-finance-document-v3";
const C={
  KZT:{n:"Казахстанский тенге",s:"₸",k:1,l:"ru-KZ"},
  RUB:{n:"Российский рубль",s:"₽",k:.18,l:"ru-RU"},
  BYN:{n:"Белорусский рубль",s:"Br",k:.0065,l:"ru-BY"},
  UZS:{n:"Узбекский сум",s:"so'm",k:25.2,l:"uz-UZ"},
  EUR:{n:"Евро",s:"€",k:.00178,l:"de-DE"},
  USD:{n:"Доллар США",s:"$",k:.00205,l:"en-US"},
  RSD:{n:"Сербский динар",s:"RSD",k:.208,l:"sr-RS"}
};
const categories=["Жилье","Продукты","Транспорт","Связь","Кафе","Доставка","Подписка","Доход","Другое"];
const seed={
  schemaVersion:3,name:"Личные финансы 2026",currency:"KZT",accounts:{card:420000,cash:75000},savings:2850000,
  transactions:[
    {id:1,type:"income",title:"Зарплата",amount:1250000,category:"Доход",date:"2026-06-01"},
    {id:2,type:"income",title:"Арендный доход",amount:280000,category:"Доход",date:"2026-06-03"},
    {id:3,type:"expense",title:"Аренда квартиры",amount:320000,category:"Жилье",date:"2026-06-02"},
    {id:4,type:"expense",title:"Продукты",amount:148000.50,category:"Продукты",date:"2026-06-04"},
    {id:5,type:"expense",title:"Коммунальные услуги",amount:68000,category:"Жилье",date:"2026-06-05"},
    {id:6,type:"expense",title:"Транспорт",amount:72000,category:"Транспорт",date:"2026-06-06"}
  ],
  obligations:[
    {id:11,type:"credit",title:"Потребительский кредит",payment:185000,debt:1850000,total:2400000,next:"2026-06-15"},
    {id:12,type:"installment",title:"Рассрочка на технику",payment:74000,debt:444000,total:888000,next:"2026-06-20"}
  ],
  deposits:[
    {id:21,title:"Резерв",bank:"Народный банк",amount:2350000,rate:14.5,currency:"KZT",end:"2027-03-01"},
    {id:22,title:"Евро-сбережения",bank:"Local Bank",amount:850.25,rate:2.1,currency:"EUR",end:"2026-12-20"}
  ]
};
let data,view="overview",modalSubmit=null,modalAnalyticsStep=null;
const root=document.querySelector("#root"),modal=document.querySelector("#modal");
const clone=x=>JSON.parse(JSON.stringify(x));
const num=x=>Number.isFinite(+x)?+x:0;
const amountValue=x=>String(num(x)).replace(".",",");
function parseAmount(value){const cleaned=String(value??"").trim().replace(/[\s\u00a0]/g,"").replace(",",".");return cleaned===""?NaN:Number(cleaned)}
function money(value,code=data.currency){const c=C[code]||C.KZT,n=num(value),v=n.toLocaleString(c.l,{minimumFractionDigits:0,maximumFractionDigits:2});return c.s==="$"||c.s==="€"?c.s+v:v+" "+c.s}
function date(value){if(!value)return"—";return new Date(value+"T00:00:00").toLocaleDateString("ru-RU")}
function esc(value){return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function uid(){return Date.now()+Math.floor(Math.random()*1000)}
function normalizeList(list,mapper){return Array.isArray(list)?list.map(mapper):[]}
function norm(x){
  if(!x||typeof x!=="object")throw Error("Некорректный документ");
  const legacySavings=Math.max(0,num(x.savings));
  return{
    schemaVersion:3,
    name:String(x.name||"Финансовый документ"),
    currency:C[x.currency]?x.currency:"KZT",
    accounts:{card:Math.max(0,num(x.accounts?.card)),cash:Math.max(0,num(x.accounts?.cash))},
    savings:Math.max(0,num(x.savings==null?2850000:x.savings)),
    transactions:normalizeList(x.transactions,t=>({id:t.id||uid(),type:t.type==="income"?"income":"expense",title:String(t.title||"Операция"),amount:Math.max(0,num(t.amount)),category:String(t.category||"Другое"),date:t.date||new Date().toISOString().slice(0,10)})),
    obligations:normalizeList(x.obligations,o=>({id:o.id||uid(),type:o.type==="installment"||String(o.title||"").toLowerCase().includes("рассроч")?"installment":"credit",title:String(o.title||"Обязательство"),payment:Math.max(0,num(o.payment)),debt:Math.max(0,num(o.debt)),total:Math.max(0,num(o.total||o.debt)),next:o.next||""})),
    deposits:normalizeList(x.deposits,d=>({id:d.id||uid(),title:String(d.title||"Депозит"),bank:String(d.bank||""),amount:Math.max(0,num(d.amount)),rate:Math.max(0,num(d.rate)),currency:C[d.currency]?d.currency:(C[x.currency]?x.currency:"KZT"),end:d.end||""}))
  };
}
function load(){try{const stored=localStorage.getItem(KEY);return stored?norm(JSON.parse(stored)):clone(seed)}catch{return clone(seed)}}
data=load();
function save(){localStorage.setItem(KEY,JSON.stringify(data));document.querySelector("#docName").textContent=data.name}
function notify(text){const t=document.querySelector("#toast");t.textContent=text;t.classList.add("show");clearTimeout(notify.timer);notify.timer=setTimeout(()=>t.classList.remove("show"),2200)}
function calc(){const income=data.transactions.filter(x=>x.type==="income").reduce((s,x)=>s+num(x.amount),0),expenses=data.transactions.filter(x=>x.type==="expense").reduce((s,x)=>s+num(x.amount),0),payments=data.obligations.reduce((s,x)=>s+num(x.payment),0),debt=data.obligations.reduce((s,x)=>s+num(x.debt),0),initial=num(data.accounts.card)+num(data.accounts.cash),balance=initial+income-expenses-payments,load=income?payments/income*100:0,cushion=expenses+payments?num(data.savings)/(expenses+payments):0;return{income,expenses,payments,debt,initial,balance,load,cushion}}
function changeCurrency(code){if(!C[code]||code===data.currency)return;const from=C[data.currency],to=C[code],convert=value=>num(value)/from.k*to.k;data.accounts.card=convert(data.accounts.card);data.accounts.cash=convert(data.accounts.cash);data.savings=convert(data.savings);data.transactions.forEach(x=>x.amount=convert(x.amount));data.obligations.forEach(x=>{x.payment=convert(x.payment);x.debt=convert(x.debt);x.total=convert(x.total)});data.currency=code;save();render();notify("Валюта документа: "+code)}
function metric(label,value,note,warn=false){return`<article class="card metric"><small>${label}</small><div class="value">${value}</div><div class="note ${warn?"warn":""}">${note}</div></article>`}
function cards(m){return`<section class="metrics">${metric("Доступный остаток",money(m.balance),"Карта, наличные и денежный поток",m.balance<0)}${metric("Подушка безопасности",m.cushion.toFixed(1)+" мес.","Резерв: "+money(data.savings),m.cushion<3)}${metric("Долговая нагрузка",m.load.toFixed(1)+"%","Платежи: "+money(m.payments),m.load>35)}${metric("Остаток долга",money(m.debt),data.obligations.length+" активных обязательств")}</section>`}
function insight(m){if(m.balance<0)return`Расходы и обязательства превышают доступные средства на ${money(-m.balance)}.`;if(m.load>35)return`Долговая нагрузка ${m.load.toFixed(1)}% выше комфортного уровня.`;if(m.cushion<3)return`Подушки безопасности хватит на ${m.cushion.toFixed(1)} месяца. Рекомендуемый минимум — 3 месяца расходов и платежей.`;return`После расходов и обязательных платежей доступно ${money(m.balance)}. Подушки безопасности хватит примерно на ${m.cushion.toFixed(1)} месяца.`}
function txrow(x){return`<div class="row"><div><b>${esc(x.title)}</b><div class="meta">${esc(x.category)} · ${date(x.date)}</div></div><span class="amount ${x.type}">${x.type==="income"?"+":"−"}${money(x.amount)}</span></div>`}
function accountPanel(){return`<article class="card panel"><div class="sectionhead"><h2>Деньги на счетах</h2><button class="btn small" data-action="balances">Изменить</button></div><div class="accountgrid"><div class="account"><small>На карте</small><b>${money(data.accounts.card)}</b></div><div class="account"><small>Наличные</small><b>${money(data.accounts.cash)}</b></div></div></article>`}
function overview(){const m=calc(),latest=[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);root.innerHTML=cards(m)+`<section class="grid"><div>${accountPanel()}<article class="card panel"><h2>Последние операции</h2><div class="list">${latest.length?latest.map(txrow).join(""):`<div class="empty">Операций пока нет</div>`}</div></article></div><article class="card panel"><h2>Локальный AI-анализ</h2><div class="insight">${insight(m)}</div><div class="privacy">Расчеты выполняются в валюте документа ${data.currency}. Депозиты в других валютах показываются отдельно без автоматической конвертации.</div></article></section>`}
function transactions(){const rows=[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date));root.innerHTML=rows.length?`<div class="table"><table><thead><tr><th>Дата</th><th>Операция</th><th>Категория</th><th>Сумма</th><th>Действия</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${date(x.date)}</td><td><b>${esc(x.title)}</b></td><td>${esc(x.category)}</td><td class="amount ${x.type}">${x.type==="income"?"+":"−"}${money(x.amount)}</td><td><div class="rowactions"><button class="btn small" data-action="edit-tx" data-id="${x.id}">Изменить</button><button class="btn small danger" data-action="delete-tx" data-id="${x.id}">Удалить</button></div></td></tr>`).join("")}</tbody></table></div>`:`<div class="empty">Добавьте первую операцию</div>`}
function obligations(){const m=calc();root.innerHTML=cards(m)+`<article class="card panel"><div class="sectionhead"><h2>Кредиты и рассрочки</h2><button class="btn primary" data-action="add-obligation">+ Обязательство</button></div>${data.obligations.length?`<div class="table"><table><thead><tr><th>Тип</th><th>Название</th><th>Платеж</th><th>Остаток долга</th><th>Следующий платеж</th><th>Действия</th></tr></thead><tbody>${data.obligations.map(x=>`<tr><td>${x.type==="installment"?"Рассрочка":"Кредит"}</td><td><b>${esc(x.title)}</b><div class="meta">Первоначальная сумма: ${money(x.total)}</div></td><td>${money(x.payment)}</td><td>${money(x.debt)}</td><td>${date(x.next)}</td><td><div class="rowactions"><button class="btn small" data-action="edit-obligation" data-id="${x.id}">Изменить</button><button class="btn small danger" data-action="delete-obligation" data-id="${x.id}">Удалить</button></div></td></tr>`).join("")}</tbody></table></div>`:`<div class="empty">Добавьте кредит или рассрочку</div>`}</article>`}
function deposits(){root.innerHTML=`<article class="card panel"><div class="sectionhead"><div><h2>Депозиты</h2><p class="sub">Каждый депозит хранится и отображается в своей валюте.</p></div><button class="btn primary" data-action="add-deposit">+ Депозит</button></div>${data.deposits.length?`<div class="depositgrid">${data.deposits.map(x=>`<section class="deposit"><small>${esc(x.bank||"Банк не указан")} · ${x.currency}</small><b>${money(x.amount,x.currency)}</b><div class="meta">${esc(x.title)} · ${num(x.rate).toLocaleString("ru-RU",{maximumFractionDigits:2})}% годовых</div><div class="meta">До ${date(x.end)}</div><div class="rowactions"><button class="btn small" data-action="edit-deposit" data-id="${x.id}">Изменить</button><button class="btn small danger" data-action="delete-deposit" data-id="${x.id}">Удалить</button></div></section>`).join("")}</div>`:`<div class="empty">Добавьте первый депозит в любой поддерживаемой валюте</div>`}</article>`}
function scenarios(){const m=calc(),step=.01,max=Math.max(500000*C[data.currency].k,Math.max(0,m.balance));root.innerHTML=`<section class="scenario"><article class="card panel"><h2>Сценарий «что если»</h2><div class="control"><label>Изменение дохода <b id="iv">0%</b></label><input id="incomeRange" type="range" min="-30" max="50" step="5" value="0"></div><div class="control"><label>Изменение расходов <b id="ev">0%</b></label><input id="expenseRange" type="range" min="-30" max="40" step="5" value="0"></div><div class="control"><label>Досрочный платеж <b id="pv">${money(0)}</b></label><input id="paymentRange" type="range" min="0" max="${max}" step="${step}" value="0"></div></article><article class="card panel"><h2>Результат</h2><div class="results"><div class="result"><small>Новый остаток</small><b id="rb"></b></div><div class="result"><small>Остаток долга</small><b id="rd"></b></div><div class="result"><small>Долговая нагрузка</small><b id="rl"></b></div><div class="result"><small>Первоначальные средства</small><b>${money(m.initial)}</b></div></div><div class="insight" id="ri" style="margin-top:14px"></div></article></section>`;const update=()=>{const i=num(document.querySelector("#incomeRange").value),e=num(document.querySelector("#expenseRange").value),p=num(document.querySelector("#paymentRange").value),inc=m.income*(1+i/100),exp=m.expenses*(1+e/100),bal=m.initial+inc-exp-m.payments-p,load=inc?m.payments/inc*100:0;document.querySelector("#iv").textContent=(i>0?"+":"")+i+"%";document.querySelector("#ev").textContent=(e>0?"+":"")+e+"%";document.querySelector("#pv").textContent=money(p);document.querySelector("#rb").textContent=money(bal);document.querySelector("#rd").textContent=money(Math.max(0,m.debt-p));document.querySelector("#rl").textContent=load.toFixed(1)+"%";document.querySelector("#ri").textContent=bal>=0?`Сценарий сохраняет положительный остаток ${money(bal)}.`:`Сценарий создает дефицит ${money(-bal)}.`};root.querySelectorAll('input[type="range"]').forEach(x=>x.oninput=update);update()}
function ai(){const m=calc();root.innerHTML=`<section class="grid"><article class="card panel"><h2>Финансовый отчет</h2><div class="insight">${insight(m)}</div><div class="list"><div class="row"><div><b>Первоначальные средства</b><div class="meta">Карта и наличные</div></div><b>${money(m.initial)}</b></div><div class="row"><div><b>Долговая устойчивость</b><div class="meta">Платежи относительно дохода</div></div><b>${m.load.toFixed(1)}%</b></div><div class="row"><div><b>Денежный поток</b><div class="meta">С учетом счетов и обязательств</div></div><b>${money(m.balance)}</b></div></div></article><article class="card panel"><h2>Подушка безопасности</h2><div class="value">${m.cushion.toFixed(1)} мес.</div><div class="meta">Резерв: ${money(data.savings)}</div><div class="insight" style="margin-top:14px">${m.cushion>=3?"Резерв покрывает рекомендуемый минимум расходов и обязательных платежей.":"Стоит увеличить резерв минимум до трех месяцев расходов и обязательных платежей."}</div></article></section>`}
const meta={overview:["Финансовый обзор","Счета, операции и обязательства в одном документе."],transactions:["Операции","Доходы и расходы с точностью до разменной единицы."],obligations:["Обязательства","Кредиты, рассрочки и обязательные платежи."],deposits:["Депозиты","Несколько вкладов в разных валютах."],scenarios:["Сценарии","Оценка изменений доходов, расходов и досрочных платежей."],ai:["AI-анализ","Локальный отчет без передачи финансовых данных."]};
function render(){document.querySelector("#title").textContent=meta[view][0];document.querySelector("#subtitle").textContent=meta[view][1];document.querySelector("#currency").value=data.currency;document.querySelectorAll(".nav").forEach(x=>x.classList.toggle("active",x.dataset.view===view));({overview,transactions,obligations,deposits,scenarios,ai}[view])()}
function field(label,control,full=false,hint=""){return`<div class="field ${full?"full":""}"><label>${label}</label>${control}${hint?`<span class="hint">${hint}</span>`:""}</div>`}
function amountInput(id,value="",required=true){return`<input id="${id}" type="text" inputmode="decimal" value="${esc(value)}" placeholder="0,00" ${required?"required":""}>`}
function selectOptions(values,selected){return values.map(([value,label])=>`<option value="${value}" ${value===selected?"selected":""}>${esc(label)}</option>`).join("")}
function openModal(title,fields,onSubmit,submitLabel="Сохранить",analyticsStep="unknown"){document.querySelector("#modalTitle").textContent=title;document.querySelector("#modalFields").innerHTML=fields;document.querySelector("#submitBtn").textContent=submitLabel;modalSubmit=onSubmit;modalAnalyticsStep=analyticsStep;modal.classList.add("open")}
function closeModal(){modal.classList.remove("open");modalSubmit=null;modalAnalyticsStep=null}
function readMoney(id,label){const value=parseAmount(document.querySelector("#"+id).value);if(!Number.isFinite(value)||value<0)throw Error(`Проверьте поле «${label}»`);return value}
function openBalances(){openModal("Остатки и подушка",field("На карте, "+C[data.currency].s,amountInput("card",amountValue(data.accounts.card)),false,"Можно вводить через запятую, например 1250,50")+field("Наличные, "+C[data.currency].s,amountInput("cash",amountValue(data.accounts.cash)))+field("Подушка безопасности, "+C[data.currency].s,amountInput("savings",amountValue(data.savings)),true,"Резерв на непредвиденные расходы"),()=>{data.accounts.card=readMoney("card","На карте");data.accounts.cash=readMoney("cash","Наличные");data.savings=readMoney("savings","Подушка безопасности");save();closeModal();render();notify("Остатки и подушка сохранены")},"Сохранить","balances")}
function openTransaction(id){const current=id?data.transactions.find(x=>x.id===id):null,t=current||{type:"expense",title:"",amount:"",category:"Другое",date:new Date().toISOString().slice(0,10)};const fields=field("Тип",`<select id="txType">${selectOptions([["expense","Расход"],["income","Доход"]],t.type)}</select>`)+field("Дата",`<input id="txDate" type="date" value="${t.date}" required>`)+field("Название",`<input id="txTitle" value="${esc(t.title)}" required>`,true)+field("Сумма, "+C[data.currency].s,amountInput("txAmount",amountValue(t.amount)),false,"Поддерживаются точка и запятая")+field("Категория",`<select id="txCategory">${selectOptions(categories.map(x=>[x,x]),t.category)}</select>`);openModal(current?"Изменить операцию":"Новая операция",fields,()=>{const item={id:current?.id||uid(),type:document.querySelector("#txType").value,title:document.querySelector("#txTitle").value.trim(),amount:readMoney("txAmount","Сумма"),category:document.querySelector("#txCategory").value,date:document.querySelector("#txDate").value};if(!item.title)throw Error("Введите название операции");if(current)Object.assign(current,item);else data.transactions.push(item);save();closeModal();render();notify(current?"Операция изменена":"Операция добавлена")},current?"Сохранить":"Добавить","transaction")}
function openObligation(id){const current=id?data.obligations.find(x=>x.id===id):null,o=current||{type:"credit",title:"",total:"",debt:"",payment:"",next:new Date().toISOString().slice(0,10)};const fields=field("Тип",`<select id="obType">${selectOptions([["credit","Кредит"],["installment","Рассрочка"]],o.type)}</select>`)+field("Следующий платеж",`<input id="obNext" type="date" value="${o.next}" required>`)+field("Название",`<input id="obTitle" value="${esc(o.title)}" required>`,true)+field("Первоначальная сумма",amountInput("obTotal",amountValue(o.total)))+field("Остаток долга",amountInput("obDebt",amountValue(o.debt)))+field("Ежемесячный платеж",amountInput("obPayment",amountValue(o.payment)));openModal(current?"Изменить обязательство":"Новое обязательство",fields,()=>{const item={id:current?.id||uid(),type:document.querySelector("#obType").value,title:document.querySelector("#obTitle").value.trim(),total:readMoney("obTotal","Первоначальная сумма"),debt:readMoney("obDebt","Остаток долга"),payment:readMoney("obPayment","Ежемесячный платеж"),next:document.querySelector("#obNext").value};if(!item.title)throw Error("Введите название обязательства");if(current)Object.assign(current,item);else data.obligations.push(item);save();closeModal();render();notify(current?"Обязательство изменено":"Обязательство добавлено")},current?"Сохранить":"Добавить","obligation")}
function openDeposit(id){const current=id?data.deposits.find(x=>x.id===id):null,d=current||{title:"",bank:"",amount:"",rate:"",currency:data.currency,end:""};const fields=field("Название",`<input id="depTitle" value="${esc(d.title)}" required>`)+field("Банк",`<input id="depBank" value="${esc(d.bank)}">`)+field("Сумма",amountInput("depAmount",amountValue(d.amount)),false,"В валюте выбранного депозита")+field("Валюта",`<select id="depCurrency">${selectOptions(Object.entries(C).map(([code,c])=>[code,code+" · "+c.n]),d.currency)}</select>`)+field("Ставка, %",amountInput("depRate",amountValue(d.rate)))+field("Дата окончания",`<input id="depEnd" type="date" value="${d.end}">`);openModal(current?"Изменить депозит":"Новый депозит",fields,()=>{const item={id:current?.id||uid(),title:document.querySelector("#depTitle").value.trim(),bank:document.querySelector("#depBank").value.trim(),amount:readMoney("depAmount","Сумма"),rate:readMoney("depRate","Ставка"),currency:document.querySelector("#depCurrency").value,end:document.querySelector("#depEnd").value};if(!item.title)throw Error("Введите название депозита");if(current)Object.assign(current,item);else data.deposits.push(item);save();closeModal();render();notify(current?"Депозит изменен":"Депозит добавлен")},current?"Сохранить":"Добавить","deposit")}
document.querySelector("#currency").innerHTML=Object.entries(C).map(([code,c])=>`<option value="${code}">${code} · ${c.n}</option>`).join("");
document.querySelector("#currency").onchange=e=>changeCurrency(e.target.value);
document.querySelectorAll(".nav").forEach(x=>x.onclick=()=>{view=x.dataset.view;render()});
document.querySelector("#addBtn").onclick=()=>openTransaction();
document.querySelector("#close").onclick=closeModal;document.querySelector("#cancel").onclick=closeModal;modal.onclick=e=>{if(e.target===modal)closeModal()};
document.querySelector("#modalForm").onsubmit=e=>{e.preventDefault();try{const step=modalAnalyticsStep||"unknown";modalSubmit?.();metrikaGoal("analysis_step_complete",{step});completeRegistrationOnce(step)}catch(error){notify(error.message||"Проверьте данные")}};
root.onclick=e=>{const button=e.target.closest("[data-action]");if(!button)return;const id=num(button.dataset.id),action=button.dataset.action;if(action==="balances")openBalances();if(action==="edit-tx")openTransaction(id);if(action==="delete-tx"&&confirm("Удалить операцию?")){data.transactions=data.transactions.filter(x=>x.id!==id);save();render()}if(action==="add-obligation")openObligation();if(action==="edit-obligation")openObligation(id);if(action==="delete-obligation"&&confirm("Удалить обязательство?")){data.obligations=data.obligations.filter(x=>x.id!==id);save();render()}if(action==="add-deposit")openDeposit();if(action==="edit-deposit")openDeposit(id);if(action==="delete-deposit"&&confirm("Удалить депозит?")){data.deposits=data.deposits.filter(x=>x.id!==id);save();render()}};
document.querySelector("#saveBtn").onclick=()=>{const a=document.createElement("a"),url=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.href=url;a.download="ai-finance-"+data.currency.toLowerCase()+".json";a.click();setTimeout(()=>URL.revokeObjectURL(url),0)};
document.querySelector("#openBtn").onclick=()=>document.querySelector("#file").click();
document.querySelector("#file").onchange=async e=>{try{if(!e.target.files[0])return;data=norm(JSON.parse(await e.target.files[0].text()));save();view="overview";render();notify("Документ открыт")}catch{notify("Некорректный JSON")}finally{e.target.value=""}};
document.querySelector("#newBtn").onclick=()=>{if(confirm("Создать новый документ в выбранной валюте?")){data=norm({name:"Новый финансовый документ",currency:data.currency,accounts:{card:0,cash:0},savings:0,transactions:[],obligations:[],deposits:[]});save();view="overview";render()}};
save();render();
</script>
</body>
</html>
