:root{--bg:#f4f6f8;--paper:#fff;--ink:#17211f;--muted:#68736f;--line:#d8dfdc;--green:#14785e;--soft:#e7f3ee;--red:#ac4f47;--blue:#315f91;--bluesoft:#eaf0f7;--shadow:0 14px 38px rgba(27,42,37,.08)}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:240px minmax(0,1fr)}aside{position:sticky;top:0;height:100vh;padding:22px 15px;border-right:1px solid var(--line);background:var(--paper);display:flex;flex-direction:column}.brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;font-weight:800}.logo{width:38px;height:38px;border-radius:8px;display:grid;place-items:center;color:#fff;background:var(--green)}nav{display:grid;gap:5px}.nav{min-height:42px;padding:0 11px;border:0;border-radius:7px;color:var(--muted);background:transparent;text-align:left}.nav.active{color:var(--green);background:var(--soft);font-weight:750}.local{margin-top:auto;padding:13px;border:1px solid #bddbcf;border-radius:8px;color:#285c4d;background:var(--soft);font-size:13px;line-height:1.45}main{min-width:0;padding:24px clamp(18px,3.5vw,42px) 44px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:16px}h1{margin:0 0 5px;font-size:clamp(27px,3.5vw,42px);line-height:1.08}.sub{margin:0;color:var(--muted)}.tools{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}.btn,.currency{min-height:40px;padding:0 13px;border:1px solid var(--line);border-radius:7px;color:var(--ink);background:var(--paper)}.btn.primary{color:#fff;border-color:var(--green);background:var(--green)}.doc{margin-bottom:16px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper);display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--muted);font-size:13px}.doc strong,.saved{color:var(--green)}.currency{min-height:34px;padding:4px 8px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:13px;margin-bottom:16px}.card{border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:var(--shadow)}.metric{min-height:120px;padding:16px}.metric small{color:var(--muted)}.value{margin:12px 0 6px;font-size:25px;font-weight:800}.note{color:var(--green);font-size:13px;font-weight:700}.note.warn,.expense{color:var(--red)}.grid{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(290px,.8fr);gap:16px;align-items:start}.panel{padding:18px}.panel+.panel{margin-top:16px}h2{margin:0 0 14px;font-size:19px}.list{display:grid}.row{min-height:58px;padding:10px 0;border-bottom:1px solid #edf1ef;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}.row:last-child{border-bottom:0}.row b{display:block}.meta{margin-top:3px;color:var(--muted);font-size:13px}.amount{font-weight:800;white-space:nowrap}.income{color:var(--green)}.bars{height:245px;padding-top:15px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:end}.barcol{height:210px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px;color:var(--muted);font-size:12px}.bar{width:min(52px,80%);min-height:8px;border-radius:6px 6px 0 0;background:var(--green)}.bar.red{background:var(--red)}.barvalue{color:var(--ink);font-weight:700}.insight{padding:14px;border:1px solid #cbd9e8;border-radius:8px;color:#294e75;background:var(--bluesoft);line-height:1.5}.privacy{margin-top:10px;color:var(--muted);font-size:12px}.table{overflow:auto;border:1px solid var(--line);border-radius:8px;background:var(--paper)}table{width:100%;min-width:680px;border-collapse:collapse}th,td{padding:13px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);background:#f8faf9;font-size:12px}tr:last-child td{border:0}.scenario{display:grid;grid-template-columns:minmax(260px,.7fr) minmax(0,1.3fr);gap:16px}.control{margin-bottom:18px}.control label{margin-bottom:7px;display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.control input{width:100%;accent-color:var(--green)}.results{display:grid;grid-template-columns:1fr 1fr;gap:12px}.result{padding:14px;border:1px solid var(--line);border-radius:8px;background:#f8faf9}.result small{color:var(--muted)}.result b{display:block;margin-top:7px;font-size:22px}.modalbg{position:fixed;inset:0;z-index:10;padding:18px;background:rgba(21,31,28,.48);display:none;place-items:center}.modalbg.open{display:grid}.modal{width:min(520px,100%);padding:20px;border-radius:8px;background:var(--paper)}.modalhead{display:flex;justify-content:space-between;align-items:center}.close{width:36px;height:36px;border:1px solid var(--line);border-radius:7px;background:#fff}.form{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{color:var(--muted);font-size:13px}.field input,.field select{min-height:42px;padding:8px 10px;border:1px solid var(--line);border-radius:7px}.actions{margin-top:17px;display:flex;justify-content:flex-end;gap:8px}.toast{position:fixed;right:20px;bottom:20px;padding:12px 14px;border-radius:8px;color:#fff;background:#243631;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:900px){body{overflow-x:hidden}.app{grid-template-columns:1fr}aside{position:static;height:auto;padding:12px;overflow:hidden}.brand,.local{display:none}nav{display:flex;overflow:auto}.nav{white-space:nowrap}.top{flex-direction:column}.tools{justify-content:flex-start}.metrics{grid-template-columns:1fr 1fr}.grid,.scenario{grid-template-columns:1fr}}@media(max-width:600px){main{padding:18px 12px 32px;overflow:hidden}.metrics,.results{grid-template-columns:1fr}.tools{display:grid;grid-template-columns:1fr 1fr;width:100%}.btn{white-space:normal}.doc{align-items:flex-start;flex-direction:column}.form{grid-template-columns:1fr}.field.full{grid-column:auto}.barvalue{display:none}}

<body>
<div class="app">
<aside><div class="brand"><span class="logo">AF</span>AI Finance</div><nav><button class="nav active" data-view="overview">Обзор</button><button class="nav" data-view="transactions">Операции</button><button class="nav" data-view="obligations">Обязательства</button><button class="nav" data-view="scenarios">Сценарии</button><button class="nav" data-view="ai">AI-анализ</button></nav><div class="local"><b>Локальный режим</b><br>Финансовый документ хранится на устройстве. Выбранная валюта является валютой всего документа.</div></aside>
<main><div class="top"><div><h1 id="title">Финансовый обзор</h1><p class="sub" id="subtitle">Текущее состояние локального финансового документа.</p></div><div class="tools"><button class="btn" id="newBtn">Новый</button><button class="btn" id="openBtn">Открыть JSON</button><button class="btn" id="saveBtn">Сохранить JSON</button><button class="btn primary" id="addBtn">+ Операция</button></div></div><div class="doc"><span><strong id="docName">Личные финансы 2026</strong></span><select class="currency" id="currency" aria-label="Валюта документа"></select><span><b class="saved">Автосохранено локально</b> · без сервера</span></div><div id="root"></div><input id="file" type="file" accept=".json,application/json" hidden></main>
</div>
<div class="modalbg" id="modal"><section class="modal"><div class="modalhead"><h2>Новая операция</h2><button class="close" id="close">×</button></div><form id="form"><div class="form"><div class="field"><label>Тип<select id="type"><option value="expense">Расход</option><option value="income">Доход</option></select></label></div><div class="field"><label>Дата<input id="date" type="date" required></label></div><div class="field full"><label>Название<input id="name" required></label></div><div class="field"><label>Сумма, <span id="symbol">₸</span><input id="amount" type="number" min="0.01" required></label></div><div class="field"><label>Категория<select id="category"><option>Жилье</option><option>Продукты</option><option>Транспорт</option><option>Связь</option><option>Доход</option><option>Другое</option></select></label></div></div><div class="actions"><button class="btn" type="button" id="cancel">Отмена</button><button class="btn primary">Добавить</button></div></form></section></div><div class="toast" id="toast"></div>
<script>
const KEY="ai-finance-document-v3",C={KZT:{n:"Казахстанский тенге",s:"₸",k:1,l:"ru-KZ",d:0},RUB:{n:"Российский рубль",s:"₽",k:.18,l:"ru-RU",d:0},BYN:{n:"Белорусский рубль",s:"Br",k:.0065,l:"ru-BY",d:2},UZS:{n:"Узбекский сум",s:"so'm",k:25.2,l:"uz-UZ",d:0},EUR:{n:"Евро",s:"€",k:.00178,l:"de-DE",d:2},USD:{n:"Доллар США",s:"$",k:.00205,l:"en-US",d:2},RSD:{n:"Сербский динар",s:"RSD",k:.208,l:"sr-RS",d:0}},seed={schemaVersion:2,name:"Личные финансы 2026",currency:"KZT",savings:2850000,transactions:[{id:1,type:"income",title:"Зарплата",amount:1250000,category:"Доход",date:"2026-06-01"},{id:2,type:"income",title:"Арендный доход",amount:280000,category:"Доход",date:"2026-06-03"},{id:3,type:"expense",title:"Аренда квартиры",amount:320000,category:"Жилье",date:"2026-06-02"},{id:4,type:"expense",title:"Продукты",amount:148000,category:"Продукты",date:"2026-06-04"},{id:5,type:"expense",title:"Коммунальные услуги",amount:68000,category:"Жилье",date:"2026-06-05"},{id:6,type:"expense",title:"Транспорт",amount:72000,category:"Транспорт",date:"2026-06-06"}],obligations:[{title:"Потребительский кредит",payment:185000,debt:1850000,next:"2026-06-15"},{title:"Рассрочка на технику",payment:74000,debt:444000,next:"2026-06-20"}]};let data=load(),view="overview";const root=document.querySelector("#root"),modal=document.querySelector("#modal"),cur=()=>C[data.currency]||C.KZT,money=n=>{const c=cur(),v=(+n||0).toLocaleString(c.l,{minimumFractionDigits:c.d,maximumFractionDigits:c.d});return c.s==="$"||c.s==="€"?c.s+v:v+" "+c.s},date=x=>new Date(x+"T00:00:00").toLocaleDateString("ru-RU"),esc=x=>String(x).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");function load(){try{return norm(JSON.parse(localStorage.getItem(KEY)))}catch{return structuredClone(seed)}}function norm(x){if(!x||typeof x!=="object")throw Error("Некорректный документ");return{schemaVersion:2,name:String(x.name||"Финансовый документ"),currency:C[x.currency]?x.currency:"KZT",savings:Math.max(0,+x.savings||0),transactions:Array.isArray(x.transactions)?x.transactions:[],obligations:Array.isArray(x.obligations)?x.obligations:[]}}function save(){localStorage.setItem(KEY,JSON.stringify(data));document.querySelector("#docName").textContent=data.name}function changeCurrency(code){if(!C[code]||code===data.currency)return;const a=cur(),b=C[code],convert=v=>(+v||0)/a.k*b.k;data.savings=convert(data.savings);data.transactions.forEach(x=>x.amount=convert(x.amount));data.obligations.forEach(x=>{x.payment=convert(x.payment);x.debt=convert(x.debt)});data.currency=code;save();render();notify("Валюта документа: "+code)}function calc(){const income=data.transactions.filter(x=>x.type==="income").reduce((s,x)=>s+(+x.amount||0),0),expenses=data.transactions.filter(x=>x.type==="expense").reduce((s,x)=>s+(+x.amount||0),0),payments=data.obligations.reduce((s,x)=>s+(+x.payment||0),0),debt=data.obligations.reduce((s,x)=>s+(+x.debt||0),0),balance=income-expenses-payments,cushion=(expenses+payments)?data.savings/(expenses+payments):0,load=income?payments/income*100:0;return{income,expenses,payments,debt,balance,cushion,load}}function metric(a,b,c,d=""){return`<article class="card metric"><small>${a}</small><div class="value">${b}</div><div class="note ${d}">${c}</div></article>`}function insight(m){if(m.balance<0)return`Расходы и обязательства превышают доход на ${money(-m.balance)}.`;if(m.load>35)return`Долговая нагрузка ${m.load.toFixed(1)}% выше комфортного уровня.`;if(m.cushion<3)return`Подушки хватит на ${m.cushion.toFixed(1)} месяца. Приоритет — довести резерв до трех месяцев.`;return`Положение устойчивое. После расходов и долговых платежей остается ${money(m.balance)}.`}function cards(m){return`<section class="metrics">${metric("Безопасный остаток",money(m.balance),"После обязательных платежей",m.balance<0?"warn":"")}${metric("Финансовая подушка",m.cushion.toFixed(1)+" мес.","Накопления: "+money(data.savings),m.cushion<3?"warn":"")}${metric("Долговая нагрузка",m.load.toFixed(1)+"%","Платежи: "+money(m.payments),m.load>35?"warn":"")}${metric("Остаток долга",money(m.debt),data.obligations.length+" активных обязательства")}</section>`}function txrow(x){return`<div class="row"><div><b>${esc(x.title)}</b><div class="meta">${esc(x.category)} · ${date(x.date)}</div></div><span class="amount ${x.type}">${x.type==="income"?"+":"−"}${money(x.amount)}</span></div>`}function overview(){const m=calc(),vals=[{n:"Доход",v:m.income},{n:"Расходы",v:m.expenses,r:1},{n:"Платежи",v:m.payments,r:1},{n:"Остаток",v:Math.max(0,m.balance)},{n:"Подушка",v:data.savings}],max=Math.max(...vals.map(x=>x.v),1);root.innerHTML=cards(m)+`<section class="grid"><div><article class="card panel"><h2>Доходы и расходы</h2><div class="bars">${vals.map(x=>`<div class="barcol"><span class="barvalue">${money(x.v)}</span><div class="bar ${x.r?"red":""}" style="height:${Math.max(8,x.v/max*170)}px"></div><span>${x.n}</span></div>`).join("")}</div></article><article class="card panel"><h2>Последние операции</h2><div class="list">${[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(txrow).join("")}</div></article></div><article class="card panel"><h2>Локальный AI-анализ</h2><div class="insight">${insight(m)}</div><div class="privacy">Расчеты выполняются в валюте документа ${data.currency}. Внешний AI не подключен.</div></article></section>`}function transactions(){root.innerHTML=`<div class="table"><table><thead><tr><th>Дата</th><th>Операция</th><th>Категория</th><th>Сумма</th></tr></thead><tbody>${[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).map(x=>`<tr><td>${date(x.date)}</td><td><b>${esc(x.title)}</b></td><td>${esc(x.category)}</td><td class="amount ${x.type}">${x.type==="income"?"+":"−"}${money(x.amount)}</td></tr>`).join("")}</tbody></table></div>`}function obligations(){const m=calc();root.innerHTML=cards(m)+`<div class="table"><table><thead><tr><th>Обязательство</th><th>Платеж</th><th>Остаток долга</th><th>Следующий платеж</th></tr></thead><tbody>${data.obligations.map(x=>`<tr><td><b>${esc(x.title)}</b></td><td>${money(x.payment)}</td><td>${money(x.debt)}</td><td>${date(x.next)}</td></tr>`).join("")}</tbody></table></div>`}function scenarios(){const m=calc(),step=Math.max(cur().d?.01:1,25000*cur().k),max=Math.max(500000*cur().k,m.balance);root.innerHTML=`<section class="scenario"><article class="card panel"><h2>Сценарий «что если»</h2><div class="control"><label>Изменение дохода <b id="iv">0%</b></label><input id="income" type="range" min="-30" max="50" step="5" value="0"></div><div class="control"><label>Изменение расходов <b id="ev">0%</b></label><input id="expense" type="range" min="-30" max="40" step="5" value="0"></div><div class="control"><label>Досрочный платеж <b id="pv">${money(0)}</b></label><input id="payment" type="range" min="0" max="${max}" step="${step}" value="0"></div></article><article class="card panel"><h2>Результат</h2><div class="results"><div class="result"><small>Новый остаток</small><b id="rb"></b></div><div class="result"><small>Подушка</small><b id="rc"></b></div><div class="result"><small>Остаток долга</small><b id="rd"></b></div><div class="result"><small>Долговая нагрузка</small><b id="rl"></b></div></div><div class="insight" id="ri" style="margin-top:14px"></div></article></section>`;const update=()=>{const i=+document.querySelector("#income").value,e=+document.querySelector("#expense").value,p=+document.querySelector("#payment").value,inc=m.income*(1+i/100),exp=m.expenses*(1+e/100),bal=inc-exp-m.payments-p,cush=data.savings/(exp+m.payments),load=m.payments/inc*100;document.querySelector("#iv").textContent=(i>0?"+":"")+i+"%";document.querySelector("#ev").textContent=(e>0?"+":"")+e+"%";document.querySelector("#pv").textContent=money(p);document.querySelector("#rb").textContent=money(bal);document.querySelector("#rc").textContent=cush.toFixed(1)+" мес.";document.querySelector("#rd").textContent=money(Math.max(0,m.debt-p));document.querySelector("#rl").textContent=load.toFixed(1)+"%";document.querySelector("#ri").textContent=bal>=0?`Сценарий сохраняет положительный остаток ${money(bal)}.`:`Сценарий создает дефицит ${money(-bal)}.`};root.querySelectorAll("input").forEach(x=>x.oninput=update);update()}function ai(){const m=calc();root.innerHTML=`<section class="grid"><article class="card panel"><h2>Финансовый отчет</h2><div class="insight">${insight(m)}</div><div class="list"><div class="row"><div><b>Подушка безопасности</b><div class="meta">Цель — минимум 3 месяца</div></div><b>${m.cushion.toFixed(1)} мес.</b></div><div class="row"><div><b>Долговая устойчивость</b><div class="meta">Платежи относительно дохода</div></div><b>${m.load.toFixed(1)}%</b></div><div class="row"><div><b>Денежный поток</b><div class="meta">После расходов и обязательств</div></div><b>${money(m.balance)}</b></div></div></article><article class="card panel"><h2>Валюта документа</h2><p>Все доходы, расходы, накопления и обязательства хранятся непосредственно в ${C[data.currency].n.toLowerCase()}.</p><div class="privacy">Смена валюты выполняет одноразовый пересчет существующего документа. Новые операции вводятся сразу в выбранной валюте.</div></article></section>`}const meta={overview:["Финансовый обзор","Текущее состояние локального финансового документа."],transactions:["Операции","Доходы и расходы в валюте документа."],obligations:["Обязательства","Кредиты, рассрочки и регулярные платежи."],scenarios:["Сценарии","Изменение дохода, расходов и досрочных платежей."],ai:["AI-анализ","Локальный отчет без передачи финансового файла."]};function render(){document.querySelector("#title").textContent=meta[view][0];document.querySelector("#subtitle").textContent=meta[view][1];document.querySelector("#currency").value=data.currency;document.querySelector("#symbol").textContent=cur().s;document.querySelector("#amount").step=cur().d?".01":"1";document.querySelectorAll(".nav").forEach(x=>x.classList.toggle("active",x.dataset.view===view));({overview,transactions,obligations,scenarios,ai}[view])()}function notify(x){const t=document.querySelector("#toast");t.textContent=x;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}document.querySelector("#currency").innerHTML=Object.entries(C).map(([k,v])=>`<option value="${k}">${k} · ${v.n}</option>`).join("");document.querySelector("#currency").onchange=e=>changeCurrency(e.target.value);document.querySelectorAll(".nav").forEach(x=>x.onclick=()=>{view=x.dataset.view;render()});const openModal=()=>{document.querySelector("#date").value=new Date().toISOString().slice(0,10);modal.classList.add("open")},closeModal=()=>modal.classList.remove("open");document.querySelector("#addBtn").onclick=openModal;document.querySelector("#close").onclick=closeModal;document.querySelector("#cancel").onclick=closeModal;document.querySelector("#form").onsubmit=e=>{e.preventDefault();data.transactions.push({id:Date.now(),type:document.querySelector("#type").value,title:document.querySelector("#name").value,amount:+document.querySelector("#amount").value,category:document.querySelector("#category").value,date:document.querySelector("#date").value});save();closeModal();render();notify("Операция добавлена")};document.querySelector("#saveBtn").onclick=()=>{const a=document.createElement("a"),u=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.href=u;a.download="ai-finance-"+data.currency.toLowerCase()+".json";a.click();URL.revokeObjectURL(u)};document.querySelector("#openBtn").onclick=()=>document.querySelector("#file").click();document.querySelector("#file").onchange=async e=>{try{data=norm(JSON.parse(await e.target.files[0].text()));save();render();notify("Документ открыт")}catch{notify("Некорректный JSON")}};document.querySelector("#newBtn").onclick=()=>{if(confirm("Создать новый документ в выбранной валюте?")){data=norm({name:"Новый финансовый документ",currency:data.currency,savings:0,transactions:[],obligations:[]});save();view="overview";render()}};save();render();
</script>
